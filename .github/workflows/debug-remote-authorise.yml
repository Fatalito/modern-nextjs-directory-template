name: Authorise PII Debug Access
# Gate workflow — a configured reviewer must approve this run before
# debug-remote-start.sh is allowed to fork the production database.
#
# How to configure:
#   Settings → Environments → pii-access → Required reviewers
#   (enable "Prevent self-review" so the requester cannot approve themselves)
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch requesting access
        required: true
      requester:
        description: GitHub username requesting access
        required: true
      reason:
        description: Reason for needing production PII access
        required: true

jobs:
  authorise:
    name: "PII access — ${{ github.actor }} (run ref: ${{ github.ref_name }})"
    runs-on: ubuntu-latest
    environment: pii-access
    permissions:
      contents: none
    steps:
      - name: Log access grant
        env:
          ACTOR: ${{ github.actor }}
          DECLARED_REQUESTER: ${{ inputs.requester }}
          RUN_REF: ${{ github.ref_name }}
          REQUESTED_BRANCH: ${{ inputs.branch }}
          REQUEST_REASON: ${{ inputs.reason }}
        run: |
          printf '%s\n' "PII debug access GRANTED"
          printf '  Triggered by (GitHub identity): %s\n' "$ACTOR"
          printf '  Declared requester            : %s\n' "$DECLARED_REQUESTER"
          printf '  Run ref (authoritative)       : %s\n' "$RUN_REF"
          printf '  Declared requested branch     : %s\n' "$REQUESTED_BRANCH"
          printf '  Reason                        : %s\n' "$REQUEST_REASON"
          printf '  Timestamp                     : %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo ""
          echo "Approver identity is recorded in GitHub's environment deployment audit trail."
          echo "This run log is an audit record of the access request and grant."
          echo "Use environment deployment history and your configured retention policy for long-term evidence."
