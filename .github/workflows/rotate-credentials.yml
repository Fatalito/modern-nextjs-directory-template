name: Rotate Production Credentials
# Refreshes the long-lived production DB token without a deploy.
#
# Runs monthly to avoid token expiry drift and can be triggered manually.
# Uses the same Three-Finger Swap action as deploy/rollback, then verifies
# production health against the current READY deployment.

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight production operation

jobs:
  rotate:
    name: Rotate DB Token + Health Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js & Install Dependencies
        uses: ./.github/actions/bootstrap

      - name: Setup Turso CLI
        uses: ./.github/actions/setup-turso

      - name: Resolve database context
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
          TURSO_DB_NAME: ${{ vars.TURSO_DB_NAME }}
        run: |
          : "${TURSO_DB_NAME:?TURSO_DB_NAME repo variable is required}"
          DB_NAME="${TURSO_DB_NAME}-prod"
          DATABASE_URL="$(turso db show "$DB_NAME" --url)"
          {
            echo "DB_NAME=$DB_NAME"
            echo "DATABASE_URL=$DATABASE_URL"
          } >> "$GITHUB_ENV"

      - name: Rotate DB token (Three-Finger Swap)
        uses: ./.github/actions/rotate-db-token
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          turso-api-token: ${{ secrets.TURSO_API_TOKEN }}

      - name: Resolve current production deployment URL
        id: prod-url
        run: |
          DATA=$(curl -fsS --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=100" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          URL=$(echo "$DATA" | jq -r \
            '(.deployments // [])[]
             | select((.target // "") == "production")
             | select((.readyState // "") == "READY")
             | "https://" + .url' \
            | head -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not resolve a READY production deployment URL from Vercel API."
            exit 1
          fi
          echo "value=$URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        # Retry for up to 2 minutes — Vercel's edge propagation can take a few seconds.
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          URL="${{ steps.prod-url.outputs.value }}/api/health"
          echo "Health-checking $URL ..."

          HEADERS_FILE=$(mktemp)
          for i in $(seq 1 12); do
            BODY=$(curl -sf --connect-timeout 5 --max-time 10 -D "$HEADERS_FILE" \
              -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              "$URL" || echo '{}')
            STATUS=$(echo "$BODY" | jq -r '.status // empty')
            if [ "$STATUS" = "ok" ]; then
              DEPLOYED=$(grep -i "^x-commit-sha:" "$HEADERS_FILE" | tr -d '\r' | awk '{print $2}')
              if ! [[ "$DEPLOYED" =~ ^[0-9a-f]{7,}$ ]]; then
                rm -f "$HEADERS_FILE"
                echo "::error::Missing or invalid x-commit-sha header (got: '${DEPLOYED}')"
                exit 1
              fi
              rm -f "$HEADERS_FILE"
              echo "DB reachable, sha=$DEPLOYED — credential rotation healthy"
              exit 0
            fi
            echo "status=${STATUS:-unreachable} — retry $i/12 in 10 s..."
            sleep 10
          done
          rm -f "$HEADERS_FILE"
          echo "::error::Health check failed after 2 minutes (last response: $BODY)"
          exit 1

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Production DB credentials rotated and verified healthy" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Production DB credential rotation failed" >> "$GITHUB_STEP_SUMMARY"
          fi
