name: Reap Stale DB Tokens
# Invalidates Turso production token groups older than 12 months.
#
# rotate-db-token/action.yml tags every fresh token with group "prod-YYYY-MM".
# Multiple deploys in the same calendar month share one group, so they are all
# swept together. Tokens from the current month and the previous 11 months are
# never touched, giving a safe 12-month window before a group is reaped.
#
# Non-existent groups are treated as non-fatal (no tokens to invalidate is expected
# for months with no deploys). Authentication and API errors are surfaced and fail the job.
#
# Runs on the 1st of every month at 05:00 UTC (after the nightly snyk at 03:00
# and the stale-fork reaper at 04:00).
on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reap:
    name: Invalidate prod token groups (12–60 months ago)
    runs-on: ubuntu-latest
    env:
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      TURSO_DB_NAME: ${{ vars.TURSO_DB_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Turso CLI
        uses: ./.github/actions/setup-turso

      - name: Invalidate stale prod token groups
        run: |
          DB_NAME="${TURSO_DB_NAME}-prod"
          if [ -z "$TURSO_DB_NAME" ] || [ "$DB_NAME" = "-prod" ]; then
            echo "::error::TURSO_DB_NAME is not set — cannot determine target database."
            exit 1
          fi
          echo "Sweeping stale prod-YYYY-MM groups on $DB_NAME..."
          if ! turso db show "$DB_NAME" >/dev/null 2>&1; then
            echo "::error::Database '$DB_NAME' was not found or is not accessible."
            exit 1
          fi

          for MONTHS_AGO in $(seq 12 60); do
            GROUP=$(date -u -d "$MONTHS_AGO months ago" '+prod-%Y-%m')
            if [ -z "$GROUP" ]; then
              echo "::error::date failed to produce a group name for MONTHS_AGO=$MONTHS_AGO"
              exit 1
            fi
            # Capture combined stdout+stderr so errors are visible in workflow logs.
            # "not found" / "does not exist" are non-fatal — the group simply has no tokens.
            # NOTE: verify these strings against your Turso CLI version if behaviour changes.
            if OUTPUT=$(turso db tokens invalidate "$DB_NAME" --group "$GROUP" --yes 2>&1); then
              echo "  processed $GROUP"
            elif echo "$OUTPUT" | grep -qiE "group.+(not found|does not exist)"; then
              echo "  skipped $GROUP (group not found — no tokens to invalidate)"
            else
              echo "::error::Failed to invalidate group '$GROUP':"
              echo "$OUTPUT"
              exit 1
            fi
          done

          echo "Done — checked months 12 through 60 ago."
